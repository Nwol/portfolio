<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
    </style>
    <linearGradient id="letters" x1="18" y1="22" x2="112" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FFF9"/>
      <stop offset="0.35" stop-color="#D9F99D"/>
      <stop offset="0.68" stop-color="#7BE6B8"/>
      <stop offset="1" stop-color="#0A8F56"/>
